<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>LinkLib</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>📚 LinkLib</h1>
  <div class="header-actions">
    <!-- FIX: input único que abre o modal já preenchido -->
    <input id="urlInput" placeholder="Cole uma URL e pressione Enter..." onkeydown="if(event.key==='Enter') abrirModalComUrl()">
    <button onclick="abrirModalComUrl()">Adicionar</button>
  </div>
</header>

<div class="barra-busca-wrap">
  <input id="buscaInput" placeholder="🔍 Buscar por título, site ou tag..." oninput="buscar(this.value)">
</div>

<div class="filtros">
  <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
  <button class="filtro-btn" onclick="filtrar('favoritos', this)">⭐ Favoritos</button>
  <div id="filtros-categorias"></div>
</div>

<div id="app"></div>

<!-- MODAL ADICIONAR / EDITAR -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modal-titulo">Adicionar Link</h2>

    <label>URL *</label>
    <input id="modalUrl" placeholder="https://exemplo.com" />

    <label>Título</label>
    <input id="modalTitulo" placeholder="Nome amigável (opcional)" />

    <label>Categoria</label>
    <input id="modalCategoria" placeholder="ex: trabalho, estudos, lazer" />

    <label>Tags</label>
    <input id="modalTags" placeholder="ex: python, tutorial, referência" />

    <label>Legenda</label>
    <input id="modalLegenda" placeholder="Nota pessoal (opcional)" />

    <label class="label-favorito">
      <input type="checkbox" id="modalFavorito"> Marcar como favorito ⭐
    </label>

    <div class="modal-actions">
      <button onclick="fecharModal()">Cancelar</button>
      <button id="btnSalvar" onclick="salvarModal()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="main.js"></script>
</body>
</html>
